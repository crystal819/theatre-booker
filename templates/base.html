<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Theater booking</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    </head>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <body style="background-image: url('static/img/dark_bg1.jpg'); background-repeat: no-repeat; background-size: cover; background-attachment: fixed;">
        <nav class="d-flex justify-content-end">
            <button id="loginBtn">Login</button>
            <button id="profileBtn" class="d-none d-flex align-items-center justify-content-center" style="background-color: transparent; border: none;"><img src="/static/img/profile_img.jpg" style="width: 30px; height: auto;"></button>
        </nav>
        <main class="container">{% block content%} {% endblock %}</main>
    </body>
</html>

<script>
document.getElementById("loginBtn").addEventListener("click", () => {
    window.location.reload()
})
document.getElementById("profileBtn").addEventListener("click", () => {
    window.location.href = '/dashboard'
})
</script>
